name: CI

on:
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  fast-tests:
    name: Fast tests
    runs-on: ubuntu-latest
    needs: [type-check]
    container:
      image: itisfoundation/jupyter-math:3.0.5
    env:
      DISPLAY: ":0"
      NVIDIA_DRIVER_CAPABILITIES: all
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install system dependencies
        shell: bash
        run: |
          apt-get update
          apt-get install -y gnupg time procps tree curl
          apt-key adv --fetch-keys https://developer.download.nvidia.com/compute/cuda/repos/ubuntu1804/x86_64/3bf863cc.pub
          apt-key adv --fetch-keys https://developer.download.nvidia.com/compute/machine-learning/repos/ubuntu1804/x86_64/7fa2af80.pub

      - name: Install uv
        shell: bash
        run: |
          curl -LsSf https://astral.sh/uv/install.sh | env UV_INSTALL_DIR="/usr/local/bin" sh
          uv --version

      - name: Sync dependencies
        shell: bash
        run: uv sync --all-groups --frozen

      - name: Print environment
        shell: bash
        run: env | sort

      - name: Run fast tests with coverage
        shell: bash
        run: uv run pytest -v -m "not slow" --cov=src/sar_pattern_validation --cov-report=xml:coverage.xml --cov-report=term tests/

      - name: Upload fast coverage artifact
        uses: actions/upload-artifact@v4
        with:
          name: coverage-fast-tests
          path: coverage.xml
          if-no-files-found: error
          retention-days: 30

